name: Build Desktop Apps

# ============================================================
# 触发条件
# - push tags: 自动发布
# - pull_request: PR 验证
# - workflow_dispatch: 手动触发
# - workflow_call: 被 release-all.yml 复用
# ============================================================
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  workflow_call:
    inputs:
      ref:
        description: '要构建的 git 引用（tag/branch/sha）'
        required: false
        type: string
        default: ''

# ============================================================
# 全局变量
# ============================================================
env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

# ============================================================
# 任务
# ============================================================
jobs:
  # ---------- macOS 构建 ----------
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-macos-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-macos-

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Force time 0.3.51 (fix cookie 0.18.1 incompatibility)
        working-directory: desktop/src-tauri
        run: cargo update -p time --precise 0.3.51 || true

      - name: Build Tauri app (arm64)
        working-directory: desktop
        run: |
          set +e
          npm run tauri build -- --target aarch64-apple-darwin 2>&1 | tee build-macos.log
          EXIT=${PIPESTATUS[0]}
          echo "Tauri build exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "===== build-macos.log last 200 lines ====="
            tail -n 200 build-macos.log
          fi
          exit $EXIT

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-macos
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            desktop/build-macos.log
          retention-days: 30

  # ---------- Windows 构建 ----------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-windows-

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Force time 0.3.51 (fix cookie 0.18.1 incompatibility)
        working-directory: desktop/src-tauri
        run: cargo update -p time --precise 0.3.51 || true

      - name: Build Tauri app
        working-directory: desktop
        run: |
          set +e
          npm run tauri build 2>&1 | tee build-windows.log
          EXIT=${PIPESTATUS[0]}
          echo "Tauri build exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "===== build-windows.log last 200 lines ====="
            tail -n 200 build-windows.log
          fi
          exit $EXIT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/build-windows.log
          retention-days: 30

  # ---------- Linux 构建 ----------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-linux-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-linux-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Force time 0.3.51 (fix cookie 0.18.1 incompatibility)
        working-directory: desktop/src-tauri
        run: cargo update -p time --precise 0.3.51 || true

      - name: Build Tauri app
        working-directory: desktop
        run: |
          set +e
          npm run tauri build 2>&1 | tee build-linux.log
          EXIT=${PIPESTATUS[0]}
          echo "Tauri build exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "===== build-linux.log last 200 lines ====="
            tail -n 200 build-linux.log
          fi
          exit $EXIT

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-linux
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/build-linux.log
          retention-days: 30

  # ---------- 创建 GitHub Release ----------
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts structure
        run: |
          echo "=== Artifacts ==="
          ls -la artifacts/
          find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            artifacts/quickdrop-macos/*.dmg
            artifacts/quickdrop-macos/*.app.zip
            artifacts/quickdrop-windows/*.msi
            artifacts/quickdrop-windows/*.exe
            artifacts/quickdrop-linux/*.deb
            artifacts/quickdrop-linux/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Mobile Apps

# ============================================================
# 触发条件
# - push tags: 自动发布
# - pull_request: PR 验证
# - workflow_dispatch: 手动触发
# - workflow_call: 被 release-all.yml 复用
# ============================================================
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  workflow_call:
    inputs:
      ref:
        description: '要构建的 git 引用（tag/branch/sha）'
        required: false
        type: string
        default: ''

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

# ============================================================
# 任务
# ============================================================
jobs:
  # ---------- Android 构建（.apk）----------
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 手动安装 Android SDK：使用 runner 预装的 SDK（默认 ~/Android/Sdk）
      # 自动接受 license 让 AGP 能调用 sdkmanager 安装缺失的 SDK 组件
      - name: Setup Android SDK
        id: setup-android
        run: |
          set -e
          echo "=== Pre-state ==="
          echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          echo "HOME=$HOME"
          ls -la "$HOME/Android" 2>&1 || echo "No ~/Android"
          ls -la "$HOME/android-sdk" 2>&1 || echo "No ~/android-sdk"

          # 使用 runner 预装的 SDK 路径（如果有），否则用 $HOME/android-sdk
          if [ -n "$ANDROID_HOME" ]; then
            SDK_ROOT="$ANDROID_HOME"
          elif [ -n "$ANDROID_SDK_ROOT" ]; then
            SDK_ROOT="$ANDROID_SDK_ROOT"
          elif [ -d "$HOME/Android/Sdk" ]; then
            SDK_ROOT="$HOME/Android/Sdk"
          else
            SDK_ROOT="$HOME/android-sdk"
          fi
          echo "Using SDK_ROOT=$SDK_ROOT"

          # 检查 cmdline-tools 是否存在
          if [ ! -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "ERROR: sdkmanager not found at $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            echo "Available cmdline-tools:"
            ls -la "$SDK_ROOT/cmdline-tools/" 2>&1 || echo "no cmdline-tools dir"
            exit 1
          fi

          # 暴露给后续步骤
          {
            echo "ANDROID_SDK_ROOT=$SDK_ROOT"
            echo "ANDROID_HOME=$SDK_ROOT"
            echo "ANDROID_HOME_USED=$SDK_ROOT"
            echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
            echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH
          } | tee -a $GITHUB_ENV $GITHUB_PATH > /dev/null

          # 静默接受所有 license（AGP 需要）
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed 2>&1 | head -20

      - name: Diagnose environment
        run: |
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "=== java ==="
          java -version
          echo "=== gradle ==="
          gradle --version
          echo "=== sdkmanager ==="
          which sdkmanager
          sdkmanager --list_installed 2>&1 | head -20 || echo "sdkmanager failed"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # AGP 8.2.2 + Kotlin 1.9.22 兼容 Gradle 8.2 ~ 8.5
          gradle-version: '8.5'
          # 禁用 Gradle home cache（避免 Cache service 400 错误）
          cache-disabled: true

      - name: Build Debug APK (gradle 直接调用，无需 gradlew)
        id: build-apk
        working-directory: mobile/android
        run: |
          set +e
          # 实时输出到 stdout（保留 build.log 文件）
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          echo "Gradle exit code: $GRADLE_EXIT"
          exit $GRADLE_EXIT
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
          ANDROID_HOME: ${{ env.ANDROID_HOME_USED }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-android
          path: |
            mobile/android/app/build/outputs/apk/debug/*.apk
            mobile/android/build.log
          retention-days: 30
          if-no-files-found: warn

  # ---------- iOS 构建（.ipa）----------
  # 注意：iOS 构建需要 Apple 开发者账号配置
  # 配置方式：在 GitHub 仓库 Settings -> Secrets and variables -> Actions
  # 添加：APPLE_TEAM_ID, APPLE_CERTIFICATE_P12 (base64), APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    # 如果没有配置 Apple 证书，跳过此任务
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Show Xcode version
        run: xcodebuild -version

      # 安装 xcodegen 并从 project.yml 生成 QuickDrop.xcodeproj
      # 这样仓库中无需提交 .xcodeproj（已被 .gitignore 排除）
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mobile/ios
        run: xcodegen generate

      # 构建 iOS Simulator 用的 .app（无需签名）
      - name: Build for Simulator (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -project QuickDrop.xcodeproj \
            -scheme QuickDrop \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-ios
          path: |
            mobile/ios/build/Build/Products/Release-iphonesimulator/QuickDrop.app
          retention-days: 30

  # ---------- 创建移动端 Release ----------
  release:
    name: Create Mobile Release
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compress iOS .app
        run: |
          if [ -d "artifacts/quickdrop-ios/QuickDrop.app" ]; then
            cd artifacts/quickdrop-ios
            zip -r QuickDrop-iOS-Simulator.zip QuickDrop.app
            cd ../..
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}-mobile
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            artifacts/quickdrop-android/*.apk
            artifacts/quickdrop-ios/QuickDrop-iOS-Simulator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

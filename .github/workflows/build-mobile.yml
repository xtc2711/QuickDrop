name: Build Mobile Apps

# ============================================================
# 触发条件
# - push tags: 自动发布
# - pull_request: PR 验证
# - workflow_dispatch: 手动触发
# - workflow_call: 被 release-all.yml 复用
# ============================================================
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  workflow_call:
    inputs:
      ref:
        description: '要构建的 git 引用（tag/branch/sha）'
        required: false
        type: string
        default: ''

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

# ============================================================
# 任务
# ============================================================
jobs:
  # ---------- Android 构建（.apk）----------
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 手动安装 Android SDK（android-actions/setup-android 在 CI 中 9 秒内失败）
      # 1. 下载 cmdline-tools 并解压到标准位置
      # 2. 用 sdkmanager 安装 platform-tools、build-tools、platforms
      # 3. 自动接受所有 license
      - name: Setup Android SDK (manual)
        run: |
          set -e
          # 安装目录（GitHub Actions Ubuntu runner 默认位置）
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/android-sdk}"
          export ANDROID_SDK_ROOT
          # 同时写两个变量名，兼容不同工具链
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # 显式声明给后续 step 用
          echo "ANDROID_HOME_USED=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          # cmdline-tools 16.0（11076708 是 12.0，14742923 是 20.0；用 16.0 较稳）
          CMDLINE_TOOLS_VERSION="12266719"
          cd /tmp
          echo "Downloading commandline-tools ${CMDLINE_TOOLS_VERSION}..."
          curl -fSL -o cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          unzip -q cmdline-tools.zip
          # sdkmanager 期望目录结构：cmdline-tools/latest/bin/sdkmanager
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # 把 cmdline-tools/bin 加入 PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

          # 静默接受所有 license
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # 安装必要组件
          echo "Installing platform-tools, build-tools;34.0.0, platforms;android-34..."
          sdkmanager --install "platform-tools" "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -20

          echo "=== Installed packages ==="
          sdkmanager --list_installed 2>&1 | head -20

      - name: Diagnose environment
        run: |
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "=== java ==="
          java -version
          echo "=== gradle ==="
          gradle --version
          echo "=== sdkmanager ==="
          which sdkmanager
          sdkmanager --list_installed 2>&1 | head -20 || echo "sdkmanager failed"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # AGP 8.2.2 + Kotlin 1.9.22 兼容 Gradle 8.2 ~ 8.5
          gradle-version: '8.5'
          # 禁用 Gradle home cache（避免 Cache service 400 错误）
          cache-disabled: true

      - name: Build Debug APK (gradle 直接调用，无需 gradlew)
        working-directory: mobile/android
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace > build.log 2>&1
          GRADLE_EXIT=$?
          echo "Gradle exit code: $GRADLE_EXIT"
          echo "===== build.log tail (last 100 lines) ====="
          tail -n 100 build.log
          exit $GRADLE_EXIT
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
          ANDROID_HOME: ${{ env.ANDROID_HOME_USED }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-android
          path: |
            mobile/android/app/build/outputs/apk/debug/*.apk
            mobile/android/build.log
          retention-days: 30
          if-no-files-found: warn

  # ---------- iOS 构建（.ipa）----------
  # 注意：iOS 构建需要 Apple 开发者账号配置
  # 配置方式：在 GitHub 仓库 Settings -> Secrets and variables -> Actions
  # 添加：APPLE_TEAM_ID, APPLE_CERTIFICATE_P12 (base64), APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    # 如果没有配置 Apple 证书，跳过此任务
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Show Xcode version
        run: xcodebuild -version

      # 安装 xcodegen 并从 project.yml 生成 QuickDrop.xcodeproj
      # 这样仓库中无需提交 .xcodeproj（已被 .gitignore 排除）
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mobile/ios
        run: xcodegen generate

      # 构建 iOS Simulator 用的 .app（无需签名）
      - name: Build for Simulator (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -project QuickDrop.xcodeproj \
            -scheme QuickDrop \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickdrop-ios
          path: |
            mobile/ios/build/Build/Products/Release-iphonesimulator/QuickDrop.app
          retention-days: 30

  # ---------- 创建移动端 Release ----------
  release:
    name: Create Mobile Release
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compress iOS .app
        run: |
          if [ -d "artifacts/quickdrop-ios/QuickDrop.app" ]; then
            cd artifacts/quickdrop-ios
            zip -r QuickDrop-iOS-Simulator.zip QuickDrop.app
            cd ../..
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}-mobile
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            artifacts/quickdrop-android/*.apk
            artifacts/quickdrop-ios/QuickDrop-iOS-Simulator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

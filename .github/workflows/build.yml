# ============================================================
# QuickDrop Build — Tauri 桌面端原生打包
# 触发条件: 版本标签推送 / 手动触发
# ============================================================

name: Build Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - macos-arm64
          - macos-x64
          - windows-x64
          - all

jobs:
  # ---- macOS ARM64 (Apple Silicon) ----
  build-macos-arm64:
    name: "Build macOS (ARM64)"
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'macos-arm64' || inputs.platform == 'all') || github.event_name == 'push'
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:mac

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickDrop-macos-arm64
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  # ---- macOS x64 (Intel) ----
  build-macos-x64:
    name: "Build macOS (Intel)"
    runs-on: macos-13  # 最后一版 Intel Mac runners
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'macos-x64' || inputs.platform == 'all')
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:mac-intel

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickDrop-macos-x64
          path: |
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app

  # ---- Windows x64 ----
  build-windows-x64:
    name: "Build Windows (x64)"
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'windows-x64' || inputs.platform == 'all')
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:win

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickDrop-windows-x64
          path: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

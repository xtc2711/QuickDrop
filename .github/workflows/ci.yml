# ============================================================
# QuickDrop CI — 测试 + 类型检查
# 触发条件: push 到 main / PR
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- 认证服务测试 ----
  test-auth:
    name: "Auth Service Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/auth/package-lock.json
      - run: npm ci
      - run: npm test

  # ---- 信令服务测试 ----
  test-signal:
    name: "Signal Service Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/signal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/signal/package-lock.json
      - run: npm ci
      - run: npm test

  # ---- 桌面端测试 + 类型检查 ----
  test-desktop:
    name: "Desktop Tests & Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # ---- 汇总结果 ----
  ci-result:
    name: "CI Result"
    needs: [test-auth, test-signal, test-desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Auth:    ${{ needs.test-auth.result }}"
          echo "Signal:  ${{ needs.test-signal.result }}"
          echo "Desktop: ${{ needs.test-desktop.result }}"
          if [[ "${{ needs.test-auth.result }}" != "success" ]] ||
             [[ "${{ needs.test-signal.result }}" != "success" ]] ||
             [[ "${{ needs.test-desktop.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All checks passed"

# QuickDrop iOS — XcodeGen Project Spec
#
# 使用 XcodeGen 生成 .xcodeproj：
#   $ brew install xcodegen
#   $ cd mobile/ios && xcodegen generate
#1
# 如需手动创建 Xcode 项目：
#   1. 打开 Xcode → New Project → iOS App
#   2. Product Name: QuickDrop, Interface: Storyboard, Language: Swift
#   3. 将所有 .swift 文件拖入项目
#   4. 将 Resources/web/ 添加为 Folder Reference

name: QuickDrop
options:
  bundleIdPrefix: com.quickdrop
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: QuickDrop/Info.plist
    DEVELOPMENT_TEAM: "" # 设置你的 Apple Developer Team ID
    # 禁用 workspace 配置
    WORKSPACE_FILE: ""
    CREATE_WORKSPACE: "NO"

# 显式声明 scheme：XcodeGen 默认会生成 application target 的 scheme，
# 但 CI 中 `xcodebuild -scheme QuickDrop` 需要明确存在
schemes:
  QuickDrop:
    build:
      targets:
        QuickDrop: all
    run:
      config: Release
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  QuickDrop:
    type: application
    platform: iOS
    sources:
      - path: QuickDrop
        type: group
      - path: Resources/web
        type: folder
        name: web
        createIntermediateGroups: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quickdrop.app
        INFOPLIST_FILE: QuickDrop/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone, iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # WebRTC 需要
        OTHER_LINKER_FLAGS: "-framework WebKit -framework AVFoundation"
        # 明确生成位置，避免 CI 中路径不一致
        CONFIGURATION_BUILD_DIR: "$(SYMROOT)/$(CONFIGURATION)$(EFFECTIVE_PLATFORM_NAME)"
    preBuildScripts:
      - name: "Lint (Optional)"
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          fi
    configs:
      Debug:
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      Release:
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
        SWIFT_OPTIMIZATION_LEVEL: "-O"

[package]
name = "quickdrop-desktop"
version = "0.1.0"
description = "QuickDrop Desktop Client — 跨平台 P2P 文件传输"
authors = ["QuickDrop Team"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "quickdrop_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

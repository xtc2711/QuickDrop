# ============================================================
# QuickDrop — coturn STUN/TURN 服务器配置
# 用于 NAT 穿透：STUN 发现公网地址，TURN 作为最终中继回退
# ============================================================
# 快速启动：
#   1. 修改 external-ip 为你的服务器公网 IP
#   2. 生成长期凭证密钥：openssl rand -hex 32
#   3. 将密钥填入 static-auth-secret
#   4. 启动：turnserver -c turnserver.conf
# ============================================================

# ---- 监听端口 ----
listening-port=3478
# TLS 监听端口（生产环境必须启用，防止防火墙拦截非标准流量）
tls-listening-port=5349

# ---- 网络接口 ----
# 监听所有接口（生产环境建议指定具体接口）
listening-ip=0.0.0.0
# 如果有 IPv6，同时监听
# listening-ip=::

# ---- 公网 IP ----
# 【重要】替换为你的服务器公网 IP
# 如果有多个公网 IP，用逗号分隔
external-ip=REPLACE_WITH_YOUR_PUBLIC_IP

# 如果在 NAT 后面（如云主机有公网+内网 IP），同时指定内网 IP
# external-ip=公网IP/内网IP

# ---- 端口范围 ----
# TURN 中继使用的端口范围（至少 100 个端口）
# 每个中继连接消耗 1 个端口
min-port=49152
max-port=65535

# ---- 认证 ----
# 使用长期凭证（long-term credential）机制
# QuickDrop 客户端通过信令服务获取临时凭证
fingerprint

# 基于共享密钥的 REST API 认证（推荐）
# coturn 会调用 auth-service 验证用户名/密码
# 格式：static-auth-secret=<your-64-char-hex-secret>
# 生成：openssl rand -hex 32
static-auth-secret=REPLACE_WITH_SECRET_HEX_64_CHARS

# 备选：静态用户密码对（测试环境）
# user=quickdrop:your-password-here

# Realm（标识服务器域，客户端会在认证质询中看到）
realm=quickdrop.app

# ---- TLS / DTLS ----
# 生产环境必须配置证书
# 使用 Let's Encrypt 免费证书：
#   certbot certonly --standalone -d turn.quickdrop.app
# cert=/etc/letsencrypt/live/turn.quickdrop.app/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.quickdrop.app/privkey.pem

# ---- 日志 ----
# 生产环境建议使用 syslog；开发环境用 stdout
log-file=stdout
# 日志级别：verbose（开发）/ normal（生产）
verbose

# ---- 性能调优 ----
# 每个会话的最大带宽（bps），0=不限制
# 默认不限制，让 QuickDrop 应用层管理速率
max-bps=0

# 最大同时会话数（根据服务器配置调整）
max-sessions=500

# 配额限制：每个用户最大同时中继会话数
user-quota=10

# 总配额限制
total-quota=500

# ---- 超时 ----
# 无数据活动的 stale-nonce 超时（秒）
stale-nonce=600

# 认证后无活动的连接超时（秒）
no-auth-timeout=30

# ---- 移动端优化 ----
# 启用 mobility（ICE mobility，移动网络切换时保持连接）
mobility

# ---- 安全 ----
# 拒绝 stun-only 绑定请求的 TURN 分配
no-stun-out

# 限制 TURN 中继地址的对等方
# 防止开放的 TURN 中继被滥用
no-loopback-peers
# 阻止将中继流量发给已知内网地址
no-multicast-peers

# 速率限制：拒绝高速率的分配请求
# 100 秒内最多 10 个新分配（防止滥用）
allocation-lifetime=3600
stale-nonce=600

# ---- 数据库 ----
# TURN 用户数据库（基于共享密钥时不需要用户数据库）
# 若需持久化用户，取消注释：
# userdb=/var/lib/coturn/turndb

# ---- WebRTC 特定 ----
# 允许 WebRTC 必需的 UDP 候选和 TCP 候选
# （默认行为，无需额外配置）

# ---- 监控 ----
# 启用 Prometheus 指标导出（可选）
# prometheus
# prometheus-format-bps=true

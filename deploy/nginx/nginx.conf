# ============================================================
# QuickDrop 生产环境 — Nginx 反向代理
# 功能: HTTPS 终止、WebSocket 升级、API 路由、限速
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ---- 基础配置 ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- 日志格式（含连接时间、Upgrade 头）----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$http_upgrade"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- 限速区域 ----
    # 每个 IP 每秒最多 30 个请求（API 全局）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # 登录接口：每个 IP 每分钟最多 10 次
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # WebSocket 连接：每个 IP 最多 10 个并发
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ---- 上游服务 ----
    upstream auth_backend {
        server auth:3001;
        keepalive 32;
    }

    upstream signal_backend {
        server signal:3002;
        keepalive 32;
    }

    # ---- HTTP → HTTPS 重定向 ----
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS 主站 ----
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ---- SSL 证书（由 certbot 管理）----
        ssl_certificate     /etc/letsencrypt/live/quickdrop.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/quickdrop.app/privkey.pem;

        # ---- SSL 安全配置 ----
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ---- 安全头部 ----
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 客户端最大请求体（文件元数据，非文件本身）
        client_max_body_size 10m;

        # ---- 健康检查（不限速）----
        location /health {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- 认证服务 API ----
        location /api/v1/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ---- 登录接口特殊限速 ----
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- 注册接口特殊限速 ----
        location /api/v1/auth/register {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- 信令服务 WebSocket ----
        location /ws {
            limit_conn ws_conn 10;

            proxy_pass http://signal_backend;
            proxy_http_version 1.1;

            # WebSocket 升级必需头部
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 超时（1 小时无活动断开）
            proxy_connect_timeout 10s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # 禁用缓冲（WebSocket 需要双向实时通信）
            proxy_buffering off;
        }

        # ---- 信令服务 HTTP API（force-logout、stats）----
        location /signal/ {
            rewrite ^/signal/(.*) /$1 break;

            proxy_pass http://signal_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- 静态文件（桌面端 Web 前端）----
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
